<!DOCTYPE html>
<html>
    <body>
    <h2>JavaScript Loops</h2>
    <p id="number"></p>
    <script>
        var i = 0;
        var text = "";
        while (i < 10){
            text = text + "<br>The number is" + i;
             i++;
        }
        document.getElementById("number").innerHTML = text;
    </script>
    </body>
</html>
