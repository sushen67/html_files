<!doctype html>
<html>
    <body>
        <h2>JavaScript While Loop</h2>
        <p id="number"></p>
        <script>
            var num = 10;
            whule (num > 0) {
                if (num % 2 != 0){
                    document.write("The number " + num + "is odd.<br>");
                }
                num--;
            }
        </script>
    </body>
</html>
