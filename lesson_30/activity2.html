<html>
    <body>
        <h2>Javascript Async / await</h2>
        <h1 id= "result"></h1>
        <script>
            async function add(a,b){
                let response = await a+b;
                display(response);
            }

            function display(response){
                document.getElementById("result").innerHTML = response;
            }

            add(10,20);
        </script>
    </body>
</html>
